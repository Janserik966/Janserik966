.gallery{

.gallery figure{

}
.gallery img:hover{

}

/* Display */
#display{
    text-align:center;
    margin:10px;

}

/* Lightbox */
#lightbox{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:1000;
}
#lightbox img{

}

// Gallery functions
function upDate(previewPic){
    const display = document.getElementById("display");
    display.style.backgroundImage = url('${previewPic.src}');
    display.style.backgroundSize = "contain";
    display.style.backgroundRepeat = "no-repeat";
    display.style.backgroundPosition = "center";
    display.textContent = previewPic.alt;
}
function undo(){
    const display = document.getElementById("display");
    display.style.backgroundImage = "";
    display.textContent = "Hover over an image or focus using keyboard";
}

// Lightbox functionality
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

document.querySelectorAll('.gallery img').forEach(img=>{
    img.addEventListener('mouseover', ()=>upDate(img));
    img.addEventListener('mouseleave', ()=>undo());
    img.addEventListener('focus', ()=>upDate(img));
    img.addEventListener('blur', ()=>undo());
    img.addEventListener('click', ()=>{
        lightbox.style.display='flex';
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
    });
});

lightbox.addEventListener('click', ()=> lightbox.style.display='none');
document.addEventListener('keydown', e=>{
    if(e.key==='Escape') lightbox.style.display='none';
});

// Canvas drawing
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let drawing=false;
canvas.addEventListener("mousedown", ()=>drawing=true);
canvas.addEventListener("mouseup", ()=>{drawing=false; ctx.beginPath();});
canvas.addEventListener("mousemove", draw);
function draw(e){
    if(!drawing) return;
    ctx.lineWidth=3;
    ctx.lineCap="round";
    ctx.strokeStyle="#ef4444";
    ctx.lineTo(e.offsetX,e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX,e.offsetY);
}
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height);}
</script>
